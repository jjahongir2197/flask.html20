<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table</title>
</head>
<body>

    <h1>Multiplication Table</h1>

    <form method="POST">

        <input type="number"
        name="number"
        placeholder="Enter number">

        <button type="submit">
            Show
        </button>

    </form>

    <hr>

    {% for item in result %}

        <h2>{{ item }}</h2>

    {% endfor %}

</body>
</html>
